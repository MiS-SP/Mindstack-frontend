<mat-grid-list [cols]="techs.length">
  @for (tech of techs; track tech.label) {
    <mat-grid-tile>
      <mat-list>
        <h4>{{ tech.label }}</h4>
        @for (name of tech.values; track name) {
          <mat-list-item role="listitem">
            <mat-icon matListItemIcon>folder</mat-icon>
            <span>{{ name }}</span>
          </mat-list-item>
        }
      </mat-list>
    </mat-grid-tile>
  }
</mat-grid-list>
